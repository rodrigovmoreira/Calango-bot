services:
  calango-bot-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calango-bot-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3001"
    environment:
      - PORT=3001
    env_file:
      - .env
    networks:
      - squamata-global

  calango-bot-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
        - REACT_APP_WS_URL=${REACT_APP_WS_URL}
        - REACT_APP_FIREBASE_BUCKET=${REACT_APP_FIREBASE_BUCKET}
        - REACT_APP_SQUAMATA_UPLOAD_API_URL=${REACT_APP_SQUAMATA_UPLOAD_API_URL}
        - REACT_APP_SQUAMATA_UPLOAD_API_KEY=${REACT_APP_SQUAMATA_UPLOAD_API_KEY}
    container_name: calango-bot-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3000"
    env_file:
      - .env
    networks:
      - squamata-global

networks:
  squamata-global:
    external: true