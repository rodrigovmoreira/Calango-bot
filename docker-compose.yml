version: '3.8'

services:
  calango-bot-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calango-bot-backend
    restart: unless-stopped
    ports:
      - "3003:3001" # Host na 3003, mas o Node.js dentro continua achando que é 3001
    env_file:
      - .env
    networks:
      - calango-network

  calango-bot-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Aponta para a porta 3003 que acabamos de abrir para o backend do bot
        - REACT_APP_API_URL=http://calango-inc-appserver:3003/api
    container_name: calango-bot-frontend
    restart: unless-stopped
    ports:
      - "3004:3000" # Host na 3004, Container na 3000
    env_file:
      - .env
    networks:
      - calango-network

networks:
  calango-network:
    driver: bridge