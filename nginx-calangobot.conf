# =====================================================
# CalangoBot — Configuração Nginx para SEO
# Servidor: Fedora Server
# Domínio: bot.calangoapp.com.br
# =====================================================

# Redirecionamento HTTP → HTTPS
server {
    listen 80;
    server_name bot.calangoapp.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bot.calangoapp.com.br;

    # SSL config (gerenciado pelo Certbot)
    ssl_certificate /etc/letsencrypt/live/bot.calangoapp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.calangoapp.com.br/privkey.pem;

    root /caminho/para/calango-bot/frontend/build;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Landing page - NO cache (sempre entrega o HTML mais recente)
    location = / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /index.html =404;
    }

    # Assets com hash de conteúdo - cache agressivo (1 ano)
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # Arquivos públicos - cache curto (1 hora)
    location ~ ^/(robots.txt|sitemap.xml|og-image.png|favicon.ico|manifest.json|logo192.png|logo512.png) {
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA fallback - todas as outras rotas servem index.html
    # (para /login, /dashboard, /chat/*, etc.)
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri /index.html;
    }

    # Bloquear acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/calangobot.access.log;
    error_log /var/log/nginx/calangobot.error.log;
}
